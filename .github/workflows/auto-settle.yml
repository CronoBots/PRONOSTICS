name: Auto-settle pending picks

# v1.3 — automation upgrade : daily auto-live + Telegram channel publish.
#
# Provider: ESPN unofficial API (validated from GitHub Actions IPs).
# Covers tennis ATP/WTA, NBA, UEFA soccer, top-5 leagues. No API key.
#
# Three triggers, three behaviors:
#
# 1. Every 2h (cron "0 */2") → SHADOW
#    Computes proposals + admin diff via TELEGRAM_ADMIN_CHAT_ID.
#    No mutation of picks_data.py. Audit trail in
#    backend/data/auto_settle/<date>.json.
#
# 2. Daily 06:00 UTC (cron "0 6") → LIVE
#    By this hour, every match started 24h+ ago is finished. Settles
#    everything, commits, then chains into Telegram channel publish
#    (publish_telegram.py --result yesterday) so subscribers get the
#    daily result post WITHOUT manual intervention.
#
# 3. workflow_dispatch → operator picks: shadow / live / reminder / dry-run
#
# Safety: live mode aborts if any pick has skipped_unknown OR
# skipped_no_data (would mean ESPN didn't have the data). Operator
# settles those manually via §1 protocol.
#
# See CLAUDE.md §12 for full documentation.

on:
  schedule:
    # Shadow every 2h — proposals + admin diff
    - cron: "0 */2 * * *"
    # Live once daily at 06:00 UTC — actual settlement + Telegram channel
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (shadow | live | reminder | dry-run)"
        type: choice
        required: true
        default: "shadow"
        options:
          - shadow
          - live
          - reminder
          - dry-run

permissions:
  contents: write

# Serialize so concurrent crons don't race on git push or split-brain
# state on picks_data.py.
concurrency:
  group: auto-settle
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Determine mode
        id: m
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            # Auto mode based on cron schedule. 06:00 UTC → live ;
            # any other cron tick → shadow.
            CRON="${{ github.event.schedule }}"
            if [ "$CRON" = "0 6 * * *" ]; then
              MODE="live"
            else
              MODE="shadow"
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Selected mode: $MODE"
      - name: Run settlement
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Public subscriber channel (publish_telegram.py).
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # Separate operator DM for shadow proposal diffs. If absent,
          # auto_settle.py logs to stderr — NEVER falls back to channel.
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.email "auto-settle@nexbet.dev"
          git config user.name "NEXBET Auto-Settle"
          case "${{ steps.m.outputs.mode }}" in
            reminder)
              python scripts/auto_settle.py --reminder
              cd "$GITHUB_WORKSPACE"
              if ! git diff --quiet -- backend/data/auto_settle/.notified.json 2>/dev/null; then
                git add backend/data/auto_settle/.notified.json
                git commit -m "[auto] reminder dedupe state $(date -u +%Y-%m-%dT%H:%M)"
                for i in 1 2 3; do
                  git pull --rebase origin "$BRANCH" || true
                  if git push origin "HEAD:$BRANCH"; then break; fi
                  sleep $((5 * i))
                done
              fi
              ;;
            dry-run) python scripts/auto_settle.py --dry-run ;;
            shadow)
              python scripts/auto_settle.py
              cd "$GITHUB_WORKSPACE"
              if ! git diff --quiet -- backend/data/auto_settle/ 2>/dev/null; then
                git add backend/data/auto_settle/
                git commit -m "[auto] shadow proposals $(date -u +%Y-%m-%dT%H:%M)"
                for i in 1 2 3; do
                  git pull --rebase origin "$BRANCH" || true
                  if git push origin "HEAD:$BRANCH"; then break; fi
                  sleep $((5 * i))
                done
              fi
              ;;
            live)
              # Live mode = mutate picks_data.py + picks_translations_en.py
              # + run build_history.py + commit. Exits non-zero on failure
              # (the in-memory snapshot/restore inside auto_settle.py
              # handles file rollback).
              python scripts/auto_settle.py --live
              SETTLE_RC=$?
              if [ $SETTLE_RC -ne 0 ]; then
                echo "auto-settle live failed (rc=$SETTLE_RC) — aborting push + Telegram chain"
                exit $SETTLE_RC
              fi
              # Push with retry-on-conflict.
              for i in 1 2 3; do
                git pull --rebase origin "$BRANCH" || true
                if git push origin "HEAD:$BRANCH"; then
                  break
                fi
                if [ $i -eq 3 ]; then
                  echo "auto-settle: push failed after 3 retries"
                  exit 1
                fi
                sleep $((5 * i))
              done
              # Chain into Telegram channel publish for the just-settled
              # results (yesterday's picks per local UTC). publish_telegram
              # gracefully no-ops if there's nothing to publish.
              YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)
              echo "Publishing result for $YESTERDAY to Telegram channel"
              python scripts/publish_telegram.py --result "$YESTERDAY" || true
              ;;
            *) echo "unknown mode"; exit 1 ;;
          esac
