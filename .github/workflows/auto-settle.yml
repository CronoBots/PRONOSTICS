name: Auto-settle pending picks

# Settlement REMINDER pipeline (v1.1 — pivot from auto-settle to
# manual-settle-with-smart-reminders, after SofaScore proved blocked by
# Cloudflare from GitHub Actions IPs).
#
# - Every 2 hours: runs in REMINDER mode — pings the operator on
#   Telegram with the list of pending picks past kickoff+2h that still
#   need manual settlement per CLAUDE.md §1. No provider call, no file
#   mutation.
# - workflow_dispatch can still trigger shadow / live / dry-run /
#   reminder for testing or for when a working provider is wired.
#
# Why every 2h (not 30 min like before): manual settlement is the
# bottleneck. Pinging every 30 min would over-notify; once every 2h
# matches the natural cadence of "match ended, scroll Telegram, settle."
#
# See CLAUDE.md §12 for full documentation of all modes.

on:
  schedule:
    - cron: "0 */2 * * *"  # every 2 hours (00:00, 02:00, 04:00, ...)
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (reminder | shadow | live | dry-run)"
        type: choice
        required: true
        default: "reminder"
        options:
          - reminder
          - shadow
          - live
          - dry-run

permissions:
  contents: write

# F8: serialize live runs so overlapping crons can't race on git push.
# Shadow runs are also serialized to prevent doubled admin pings.
concurrency:
  group: auto-settle-live
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Determine mode
        id: m
        run: |
          MODE="${{ github.event.inputs.mode }}"
          # Default cron path → reminder (provider blocked, see header comment)
          if [ -z "$MODE" ]; then MODE="reminder"; fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
      - name: Run settlement
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # F3: Public channel for result posts (publish_telegram.py).
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # F3: Separate admin chat for shadow-mode proposal diffs.
          # MUST be configured as a GitHub Actions secret (operator's
          # personal chat ID, not the subscriber channel). If absent,
          # auto_settle.py logs to stderr instead — NEVER falls back to
          # the public channel.
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.email "auto-settle@nexbet.dev"
          git config user.name "NEXBET Auto-Settle"
          case "${{ steps.m.outputs.mode }}" in
            reminder)
              python scripts/auto_settle.py --reminder
              # Persist .notified.json so dedupe works across runs (else
              # the operator gets the same ping every 2h until they settle).
              cd "$GITHUB_WORKSPACE"
              if ! git diff --quiet -- backend/data/auto_settle/.notified.json 2>/dev/null; then
                git add backend/data/auto_settle/.notified.json
                git commit -m "[auto] reminder dedupe state $(date -u +%Y-%m-%dT%H:%M)"
                # Retry-on-conflict (operator might have just pushed)
                for i in 1 2 3; do
                  git pull --rebase origin "$BRANCH" || true
                  if git push origin "HEAD:$BRANCH"; then break; fi
                  sleep $((5 * i))
                done
              fi
              ;;
            dry-run) python scripts/auto_settle.py --dry-run ;;
            shadow)  python scripts/auto_settle.py ;;
            live)
              python scripts/auto_settle.py --live || exit 1
              # F8: retry push with rebase to recover from concurrent
              # commits to the same branch (e.g. operator manual push).
              for i in 1 2 3; do
                git pull --rebase origin "$BRANCH" || true
                if git push origin "HEAD:$BRANCH"; then
                  exit 0
                fi
                sleep $((5 * i))
              done
              echo "auto-settle: push failed after 3 retries"
              exit 1
              ;;
            *) echo "unknown mode"; exit 1 ;;
          esac
