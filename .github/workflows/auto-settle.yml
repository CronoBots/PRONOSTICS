name: Auto-settle pending picks

# v1.2 — provider swap (SofaScore → ESPN unofficial).
#
# SofaScore was blocked by Cloudflare from GitHub Actions cloud IPs
# (probe_providers.py confirmed 403). ESPN's public scoreboard endpoint
# passes (200) from the same runners — covers tennis ATP/WTA, NBA, UEFA
# soccer, all major football leagues. No API key needed.
#
# - Every 2h: SHADOW mode (writes proposals to backend/data/auto_settle/<date>.json
#   + Telegram admin diff via TELEGRAM_ADMIN_CHAT_ID, NO mutation of
#   picks_data.py). Operator reviews proposals; flips to live when confident.
# - workflow_dispatch with mode=live: actually mutates picks_data.py +
#   picks_translations_en.py, regenerates history.json, commits + pushes.
# - mode=reminder: legacy fallback (provider-less, just pings list of
#   due picks). Kept for when ESPN is down.
#
# See CLAUDE.md §12 for full documentation.

on:
  schedule:
    - cron: "0 */2 * * *"  # every 2 hours
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (shadow | live | reminder | dry-run)"
        type: choice
        required: true
        default: "shadow"
        options:
          - shadow
          - live
          - reminder
          - dry-run

permissions:
  contents: write

# F8: serialize live runs so overlapping crons can't race on git push.
# Shadow runs are also serialized to prevent doubled admin pings.
concurrency:
  group: auto-settle-live
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Determine mode
        id: m
        run: |
          MODE="${{ github.event.inputs.mode }}"
          # v1.2: provider is ESPN (passes from GH runners). Default
          # cron mode = shadow (compute proposals + admin diff, no
          # write). Promote to live via workflow_dispatch when ready.
          if [ -z "$MODE" ]; then MODE="shadow"; fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
      - name: Run settlement
        working-directory: backend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # F3: Public channel for result posts (publish_telegram.py).
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # F3: Separate admin chat for shadow-mode proposal diffs.
          # MUST be configured as a GitHub Actions secret (operator's
          # personal chat ID, not the subscriber channel). If absent,
          # auto_settle.py logs to stderr instead — NEVER falls back to
          # the public channel.
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.email "auto-settle@nexbet.dev"
          git config user.name "NEXBET Auto-Settle"
          case "${{ steps.m.outputs.mode }}" in
            reminder)
              python scripts/auto_settle.py --reminder
              # Persist .notified.json so dedupe works across runs (else
              # the operator gets the same ping every 2h until they settle).
              cd "$GITHUB_WORKSPACE"
              if ! git diff --quiet -- backend/data/auto_settle/.notified.json 2>/dev/null; then
                git add backend/data/auto_settle/.notified.json
                git commit -m "[auto] reminder dedupe state $(date -u +%Y-%m-%dT%H:%M)"
                # Retry-on-conflict (operator might have just pushed)
                for i in 1 2 3; do
                  git pull --rebase origin "$BRANCH" || true
                  if git push origin "HEAD:$BRANCH"; then break; fi
                  sleep $((5 * i))
                done
              fi
              ;;
            dry-run) python scripts/auto_settle.py --dry-run ;;
            shadow)  python scripts/auto_settle.py ;;
            live)
              python scripts/auto_settle.py --live || exit 1
              # F8: retry push with rebase to recover from concurrent
              # commits to the same branch (e.g. operator manual push).
              for i in 1 2 3; do
                git pull --rebase origin "$BRANCH" || true
                if git push origin "HEAD:$BRANCH"; then
                  exit 0
                fi
                sleep $((5 * i))
              done
              echo "auto-settle: push failed after 3 retries"
              exit 1
              ;;
            *) echo "unknown mode"; exit 1 ;;
          esac
