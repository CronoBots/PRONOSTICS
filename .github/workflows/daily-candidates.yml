name: Daily candidates (cartographie + edge detection)

# Run quotidien à 07h00 Belgique = 05h00 UTC (UTC+2 en été).
# Produit backend/data/candidates/{date}.csv pour consultation par Claude
# lors de la sélection du pick safe du jour.
on:
  schedule:
    - cron: "0 5 * * *"  # 05:00 UTC = 07:00 CEST
  workflow_dispatch:
    inputs:
      date:
        description: "Date des candidats (YYYY-MM-DD). Vide = aujourd'hui."
        required: false
        default: ""

concurrency:
  group: daily-candidates
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run daily candidates pipeline
        working-directory: backend
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python scripts/daily_candidates.py ${{ github.event.inputs.date }}

      - name: Commit candidates CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/candidates/ || true
          if ! git diff --staged --quiet; then
            git commit -m "candidates: daily snapshot $(date -u +%Y-%m-%d)"
            # Retry push en cas de conflit avec autres workflows
            for i in 1 2 3 4; do
              if git push; then
                echo "✓ push réussi"
                break
              fi
              echo "Push échoué (tentative $i/4), pull --rebase puis retry..."
              git pull --rebase origin main || true
              sleep $((2 ** i))
            done
          else
            echo "Pas de changement à committer"
          fi
