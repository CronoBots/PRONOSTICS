name: Daily predictions update (backup auto)

# Le workflow auto est désactivé : les picks sont curés manuellement par
# Claude via la conversation, puis poussés via `scripts/build_history.py`.
# Ce workflow reste disponible en `workflow_dispatch` au cas où.
on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date des pronostics (YYYY-MM-DD). Vide = aujourd'hui."
        required: false
        default: ""

# Empêche deux runs en parallèle de se courir l'un l'autre au push
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run daily update
        working-directory: backend
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/daily_update.py ${{ github.event.inputs.date }}

      - name: Commit predictions JSON + history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/predictions/ backend/data/history.json
          if git diff --staged --quiet; then
            echo "Pas de nouveaux pronostics à committer."
            exit 0
          fi
          git commit -m "chore: pronostics + historique du jour"
          # Retry avec rebase si un autre run a poussé entre-temps
          for attempt in 1 2 3 4; do
            if git push; then
              echo "Push OK (tentative $attempt)"
              exit 0
            fi
            echo "Push rejeté, rebase puis retry ($attempt/4)..."
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "::error::Push échoué après 4 tentatives"
          exit 1
