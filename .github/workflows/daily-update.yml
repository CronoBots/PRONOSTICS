name: Daily predictions update

on:
  # Tous les jours à 06:00 UTC (08:00 Paris en été, 07:00 en hiver)
  schedule:
    - cron: "0 6 * * *"
  # Permet le déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:
    inputs:
      date:
        description: "Date des pronostics (YYYY-MM-DD). Vide = aujourd'hui."
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run daily update
        working-directory: backend
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/daily_update.py ${{ github.event.inputs.date }}

      - name: Commit predictions JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/predictions/
          if git diff --staged --quiet; then
            echo "Pas de nouveaux pronostics à committer."
          else
            git commit -m "chore: prédictions du jour"
            git push
          fi
